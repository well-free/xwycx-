<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>商品采购 - xwycx</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell commerce-app">
    <header class="topbar commerce-topbar">
      <div class="brand">
        <span class="brand-mark">XW</span>
        <div>
          <p>xwycx.xyz Disposable Supplies</p>
          <h1>商品采购</h1>
        </div>
      </div>
      <nav class="workspace-tabs" aria-label="页面导航">
        <a href="/index.html">总览</a>
        <a class="active" href="/products.html">商品采购</a>
        <a href="/orders.html">订单支付</a>
      </nav>
      <div class="topbar-actions">
        <div class="health-pill" id="userStatus"><span class="health-dot"></span>未登录</div>
        <div class="health-pill" id="serverStatus"><span class="health-dot"></span>连接中</div>
        <button id="logoutBtn" type="button" class="icon-button" title="退出登录" aria-label="退出登录"><span aria-hidden="true">⎋</span></button>
        <button id="refreshBtn" type="button" class="icon-button" title="刷新数据" aria-label="刷新数据"><span aria-hidden="true">↻</span></button>
      </div>
    </header>

    <section class="commerce-grid single-focus">
      <section class="panel catalog-panel" id="catalogPanel" aria-labelledby="productsTitle">
        <div class="panel-head">
          <div>
            <p class="section-kicker">Catalog</p>
            <h2 id="productsTitle">一次性用品商品</h2>
          </div>
          <div class="catalog-tools">
            <input id="productSearchInput" type="search" placeholder="搜索商品、SKU、规格" autocomplete="off" />
            <select id="productSortInput" aria-label="商品排序">
              <option value="hot">热度优先</option>
              <option value="priceAsc">价格从低到高</option>
              <option value="stockDesc">库存从高到低</option>
            </select>
          </div>
        </div>
        <div id="productsGrid" class="product-grid commerce-product-grid"></div>
      </section>

      <aside class="checkout-column">
        <section class="panel checkout-panel" aria-labelledby="quickTitle">
          <div class="panel-head">
            <div>
              <p class="section-kicker">Quick Order</p>
              <h2 id="quickTitle">采购信息</h2>
            </div>
            <span class="chip">创建后跳转支付</span>
          </div>
          <div id="selectedProduct" class="selected-product">请选择商品</div>
          <div class="checkout-steps" id="checkoutSteps">
            <span class="active">选品</span>
            <span>下单</span>
            <span>支付</span>
            <span>履约</span>
          </div>
          <div class="order-form checkout-form">
            <label>
              <span>采购数量</span>
              <input id="quantityInput" type="number" min="1" value="10" />
            </label>
            <button id="createOrderBtn" type="button" class="primary-action">创建采购单</button>
          </div>
          <div class="mini-output">默认使用收货地址 1，创建成功后进入订单支付页面。</div>
        </section>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
