<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - xwycx 一次性用品采购系统</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-hero" aria-label="xwycx 登录">
      <div class="brand login-brand">
        <span class="brand-mark">XW</span>
        <div>
          <p>xwycx.xyz Disposable Supplies</p>
          <h1>一次性用品采购系统</h1>
        </div>
      </div>
      <div class="login-copy">
        <strong>采购、支付、发货和售后在一个工作台完成。</strong>
        <span id="smsModeHint">正在读取短信验证码配置。</span>
      </div>
    </section>

    <section class="panel login-panel" aria-labelledby="loginTitle">
      <div class="panel-head">
        <div>
          <p class="section-kicker">Account</p>
          <h2 id="loginTitle">手机号登录</h2>
        </div>
      </div>
      <div class="order-form login-form">
        <label>
          <span>手机号</span>
          <input id="phoneInput" value="13800000001" maxlength="11" autocomplete="tel" />
        </label>
        <label>
          <span>验证码</span>
          <input id="codeInput" value="123456" maxlength="6" autocomplete="one-time-code" />
        </label>
        <div class="button-row">
          <button id="smsBtn" type="button">发送验证码</button>
          <button id="loginBtn" type="button" class="primary-action">登录并进入系统</button>
          <button id="registerBtn" type="button" class="secondary-action">注册新账号</button>
        </div>
      </div>
      <div class="result-box" id="authResult" aria-live="polite">请输入手机号获取验证码；新手机号可直接注册。</div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/login.js"></script>
</body>
</html>
